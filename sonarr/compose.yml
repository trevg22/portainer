services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/trevor/stack_data/sonarr/data:/config
      - /root/media/shows:/tv #optional
      - /home/trevor/stack_data/downloads:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped
